name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/viajarpais?sslmode=disable
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/viajarpais?sslmode=disable
      BETTER_AUTH_SECRET: ci_placeholder_secret_at_least_32_bytes_long_______________
      BETTER_AUTH_URL: http://localhost:3006
      NEXT_PUBLIC_SITE_URL: http://localhost:3006
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3006
      # Cloudinary: el SDK hace throw al import si CLOUDINARY_URL no está
      # seteada (política fail-fast, igual que `db.ts`/`auth.ts`). Build
      # solo valida formato del URL, no hace requests al servidor — un
      # placeholder sintácticamente válido alcanza.
      CLOUDINARY_URL: cloudinary://000000000000000:abcdefghijklmnopqrstuvwxyz0@viajarpais-ci
      # DeepL: `src/lib/deepl.ts` hace throw eager si DEEPL_API_KEY no
      # está. Build evalúa server modules para route discovery + RSC,
      # así que sin placeholder el módulo explota. El sufijo `:fx` lo
      # interpreta el SDK como cuenta Free (vs Pro sin sufijo). Build no
      # hace requests al servidor de DeepL — solo construye el cliente.
      DEEPL_API_KEY: 00000000-0000-0000-0000-000000000000:fx
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
