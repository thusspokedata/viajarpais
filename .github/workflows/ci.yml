name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/viajarpais?sslmode=disable
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/viajarpais?sslmode=disable
      BETTER_AUTH_SECRET: ci_placeholder_secret_at_least_32_bytes_long_______________
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
