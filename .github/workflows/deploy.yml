# Auto-deploy a la Raspberry Pi `nextcloud` del homelab.
#
# Corre en un self-hosted runner INSTALADO EN la Pi (label `viajarpais`),
# asi funciona detras de CGNAT (conexion saliente del runner a GitHub) y
# no depende de SSH ni de credenciales de la Mac.
#
# Flujo: push a main -> el runner hace checkout -> copia el app.env (los
# secrets viven solo en la Pi, fuera de git) -> docker compose up -d --build
# (reconstruye la imagen y recrea el contenedor) -> verifica HTTP 200.
name: deploy-pi

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Nunca dos deploys en paralelo; no cancelar uno en curso a mitad del build.
concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, viajarpais]
    # Least-privilege: el job solo hace checkout (lectura del repo).
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # No persistir el GITHUB_TOKEN en el workdir (el self-hosted
          # runner lo reutiliza entre jobs); el deploy no pushea nada.
          persist-credentials: false

      - name: Inyectar secrets (app.env vive solo en la Pi)
        run: cp /home/kilo/viajarpais/app.env ./app.env

      - name: Build + deploy (recrea el contenedor)
        run: docker compose up -d --build

      - name: Verificar health + HTTP 200 (home + geo)
        run: |
          # 1) Esperar healthy + home (/) en 200.
          ok=0
          for i in $(seq 1 36); do
            health=$(docker inspect -f '{{.State.Health.Status}}' viajarpais 2>/dev/null || echo none)
            home=$(curl -s --connect-timeout 2 --max-time 4 -o /dev/null -w '%{http_code}' http://127.0.0.1:3006/ || echo 000)
            echo "t=$((i*5))s health=$health home=$home"
            if [ "$health" = "healthy" ] && [ "$home" = "200" ]; then ok=1; break; fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "âś— home no respondio 200/healthy tras 180s"
            docker logs --tail 50 viajarpais || true
            exit 1
          fi
          # 2) Smoke de una pagina geo (region cuyo, del seed nacional). Es el
          #    render que rompia con DYNAMIC_SERVER_USAGE; si un deploy futuro
          #    vuelve a romper las geo con 5xx, el deploy FALLA en vez de quedar
          #    "vivo roto" (el check de solo `/` no lo cazaba).
          geo=$(curl -s --connect-timeout 2 --max-time 4 -o /dev/null -w '%{http_code}' http://127.0.0.1:3006/cuyo || echo 000)
          echo "geo /cuyo -> $geo"
          if [ "$geo" != "200" ]; then
            echo "âś— pagina geo /cuyo devolvio $geo (esperado 200)"
            docker logs --tail 50 viajarpais || true
            exit 1
          fi
          echo "âś“ deploy OK â€” home + geo responden 200, healthy"

      - name: Limpiar imagenes dangling
        if: always()
        run: docker image prune -f
